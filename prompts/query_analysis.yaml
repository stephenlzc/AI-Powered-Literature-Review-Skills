# ============================================
# Query Analysis Prompts
# ============================================

# ----- 领域识别 -----
domain_identification: |
  你是一个学术研究领域分析专家。请分析给定的研究主题，识别其学科领域。
  
  ## 可选领域
  
  - **computer_science**: 计算机科学
    - 子领域：人工智能、机器学习、深度学习、计算机视觉、自然语言处理、软件工程、网络安全、数据科学、人机交互
  
  - **medicine**: 医学
    - 子领域：临床医学、生物医学、公共卫生、药学、护理学、医学影像、病理学、肿瘤学、心脏病学
  
  - **economics**: 经济学
    - 子领域：金融、产业经济、国际贸易、计量经济、发展经济学、劳动经济学、环境经济学
  
  - **education**: 教育学
    - 子领域：教育技术、课程设计、教育心理、高等教育、K-12教育、特殊教育、职业教育
  
  - **engineering**: 工程技术
    - 子领域：电子工程、机械工程、土木工程、材料科学、化学工程、航空航天、能源工程
  
  - **social_science**: 社会科学
    - 子领域：社会学、政治学、心理学、管理学、传播学、法学、人类学
  
  - **biology**: 生物学
    - 子领域：分子生物学、生态学、遗传学、生物信息学、神经科学、微生物学
  
  - **chemistry**: 化学
    - 子领域：有机化学、无机化学、物理化学、分析化学、材料化学
  
  - **physics**: 物理学
    - 子领域：理论物理、应用物理、凝聚态物理、粒子物理、光学、量子物理
  
  - **unknown**: 未知或跨学科领域
  
  ## 分析要求
  
  1. 选择最匹配的领域代码
  2. 给出置信度评分(0-1)
  3. 说明识别理由（2-3句话）
  4. 推荐适合的数据库（从semantic_scholar, pubmed, arxiv, cnki, ieee中选择）
  5. 列出相关的研究方向

# ----- 概念提取 -----
concept_extraction: |
  从研究主题中提取结构化概念。
  
  ## 概念类型定义
  
  | 类型 | 定义 | 示例 |
  |------|------|------|
  | topic | 研究主题/核心问题 | 图像分类、情感分析、疾病预测 |
  | method | 研究方法/技术路线 | CNN、Transformer、随机森林 |
  | object | 研究对象/数据来源 | 医学图像、社交媒体数据、临床记录 |
  | domain | 应用领域/场景 | 医疗诊断、金融风控、教育评估 |
  
  ## 提取要求
  
  1. 识别3-8个相关概念
  2. 每个概念评估重要性(0-1)
  3. 提供中英文对照
  4. 概念应该具体而非过于宽泛
  5. 区分主要概念和次要概念

# ----- 同义词生成 -----
synonym_generation: |
  为学术检索生成同义词扩展。
  
  ## 扩展策略
  
  1. **同义词**: 意义相近的术语
     - 例：深度学习 ↔ 深度神经网络
  
  2. **缩写形式**: 领域内常用缩写
     - 例：Convolutional Neural Network → CNN
  
  3. **相关术语**: 经常同时出现的概念
     - 例：深度学习 + 迁移学习 + 注意力机制
  
  4. **上下位词**: 更广泛或更具体的概念
     - 上位：深度学习 → 机器学习 → 人工智能
     - 下位：深度学习 → CNN / RNN / Transformer
  
  5. **中英对应**: 中英文术语对照
     - 例：深度学习 ↔ deep learning
  
  ## 注意事项
  
  - 保持术语的学术规范性
  - 考虑中英文表达差异
  - 避免过于宽泛的词汇（如"研究"、"分析"）
  - 包括领域内新兴术语

# ----- 检索式构建 -----
search_query_generation: |
  构建优化的学术数据库检索表达式。
  
  ## 数据库特定语法
  
  ### CNKI (中国知网)
  - 字段代码: SU=主题, TI=篇名, KY=关键词, TKA=篇关摘, AU=作者, JN=期刊
  - 布尔逻辑: * = AND, + = OR, - = NOT
  - 括号: 用于分组
  - 示例: SU=('深度学习'+'深度神经网络')*('医学图像'+'医学影像')
  
  ### PubMed
  - 字段标签: [Title/Abstract], [MeSH Terms], [Author], [Journal], [Year]
  - 布尔逻辑: AND, OR, NOT（必须大写）
  - 短语: 使用双引号
  - 截词: * 表示任意字符
  - 示例: ("deep learning"[Title/Abstract] OR "neural network"[Title/Abstract]) AND ("medical imaging"[Title/Abstract])
  
  ### Semantic Scholar
  - 自然语言风格，支持布尔逻辑
  - 字段: title:, author:, venue:, year:
  - 布尔逻辑: AND, OR（小写也可）
  - 短语: 使用双引号
  - 示例: ("deep learning" OR "neural network") AND ("medical imaging" OR "radiology") AND year:2020-2024
  
  ### arXiv
  - 字段前缀: ti=标题, au=作者, abs=摘要, cat=类别, submittedDate=日期
  - 布尔逻辑: AND, OR, ANDNOT
  - 类别: cs.CV, cs.LG, cs.CL, cs.AI, cs.IR等
  - 示例: (ti:deep OR abs:learning) AND (cat:cs.CV OR cat:cs.LG)
  
  ### EXA
  - 自然语言查询，无需布尔逻辑
  - 使用完整的学术句子描述
  - 避免关键词堆砌
  - 示例: Recent advances in deep learning for medical image analysis and computer-aided diagnosis
  
  ## 构建原则
  
  1. 核心概念必须出现
  2. 同义词使用OR连接
  3. 不同概念组使用AND连接
  4. 控制复杂度，避免过长表达式
  5. 针对数据库特点优化
