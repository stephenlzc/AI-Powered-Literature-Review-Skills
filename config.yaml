# ============================================
# AI Literature Survey System Configuration
# ============================================

# ==================== 系统配置 ====================
system:
  name: "AI Literature Survey System"
  version: "2.0.0"
  debug: false
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

# ==================== 路径配置 ====================
# 支持环境变量替换: ${VAR_NAME:-default_value}
# 支持模板变量: {base_dir}, {sessions_dir}, {session_id}
paths:
  base_dir: "${LIT_SURVEY_BASE_DIR:-./literature-survey-output}"
  sessions_dir: "${LIT_SURVEY_SESSIONS_DIR:-{base_dir}/sessions}"
  cache_dir: "${LIT_SURVEY_CACHE_DIR:-{base_dir}/.cache}"
  temp_dir: "${LIT_SURVEY_TEMP_DIR:-{base_dir}/.temp}"
  pdfs_dir: "${LIT_SURVEY_PDFS_DIR:-{sessions_dir}/pdfs}"
  metadata_dir: "${LIT_SURVEY_METADATA_DIR:-{sessions_dir}/metadata}"
  checkpoints_dir: "${LIT_SURVEY_CHECKPOINTS_DIR:-{sessions_dir}/checkpoints}"
  results_dir: "${LIT_SURVEY_RESULTS_DIR:-{sessions_dir}/results}"

# ==================== LLM配置 ====================
llm:
  # 默认LLM提供商
  default_provider: "openai"  # openai, anthropic, azure, local

  # 提供商配置
  providers:
    openai:
      api_key: "${OPENAI_API_KEY}"
      base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      default_model: "gpt-4o"
      fallback_model: "gpt-4o-mini"

    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      default_model: "claude-3-5-sonnet-20241022"
      fallback_model: "claude-3-haiku-20240307"

    azure:
      api_key: "${AZURE_OPENAI_API_KEY}"
      endpoint: "${AZURE_OPENAI_ENDPOINT}"
      deployment: "${AZURE_OPENAI_DEPLOYMENT}"

  # 模型选择策略（按任务）
  model_selection:
    query_analysis: "gpt-4o"        # 需要强理解能力
    synthesis: "gpt-4o"             # 需要强生成能力
    quality_check: "gpt-4o-mini"    # 轻量级任务
    formatting: "gpt-4o-mini"       # 格式化任务

  # 通用参数
  parameters:
    temperature: 0.3
    max_tokens: 4000
    top_p: 0.9

# ==================== 搜索配置 ====================
search:
  # 默认搜索策略
  default_strategy: "parallel"  # parallel, sequential, intelligent

  # EXA配置（神经网络搜索）
  exa:
    enabled: true
    api_key: "${EXA_API_KEY}"
    search_type: "neural"  # neural, keyword, auto
    num_results: 50
    use_autoprompt: true
    category: "research_paper"
    include_domains:
      - "arxiv.org"
      - "pubmed.ncbi.nlm.nih.gov"
      - "semanticscholar.org"
      - "ieee.org"
      - "acm.org"
      - "biorxiv.org"
      - "medrxiv.org"

  # 传统数据库配置
  databases:
    semantic_scholar:
      enabled: true
      api_key: null  # 可选
      rate_limit: 100  # 每5分钟
      max_results: 100

    pubmed:
      enabled: true
      api_key: "${PUBMED_API_KEY}"
      email: "${PUBMED_EMAIL}"
      rate_limit: 3  # 每秒
      max_results: 100

    arxiv:
      enabled: true
      rate_limit: 1  # 每秒
      max_results: 100

    cnki:
      enabled: true
      # CNKI使用Playwright自动化
      headless: false  # 显示浏览器便于验证码处理
      timeout: 300  # 秒
      max_results: 50

    ieee:
      enabled: false  # 需要订阅
      api_key: "${IEEE_API_KEY}"

    openalex:
      enabled: true
      rate_limit: 10  # 每秒
      max_results: 200

# ==================== 处理配置 ====================
processing:
  # 去重配置
  deduplication:
    title_similarity_threshold: 0.85
    metadata_match_threshold: 0.9
    use_llm_assist: true  # 使用LLM辅助模糊去重

  # 质量筛选
  quality:
    min_citations: 5
    year_range: [2020, null]  # null表示当前年
    preferred_venues: []  # 优先期刊/会议列表

  # 验证配置
  verification:
    required_sources: 1  # 最少验证源数量
    verify_doi: true
    check_retractions: true
    use_llm_quality_check: true

  # 并发控制
  concurrency:
    max_parallel_search: 5
    max_parallel_download: 3
    max_parallel_verification: 5

# ==================== 交叉引用配置 ====================
cross_reference:
  enabled: true
  build_citation_graph: true
  detect_gaps: true
  recommend_citations: true
  suggest_insertion_positions: true

# ==================== 综述生成配置 ====================
synthesis:
  template: "standard"  # standard, comparative, chronological
  target_word_count: 3000
  min_sections: 3
  include_gap_analysis: true
  include_cross_references: true
  language: "zh"  # zh, en, bilingual
  use_llm_clustering: true  # 使用LLM主题聚类

# ==================== 输出配置 ====================
output:
  # 引用格式
  citation_formats:
    - "gb7714"      # GB/T 7714-2015
    - "bibtex"      # BibTeX
    - "apa"         # APA格式
    - "mla"         # MLA格式

  # 导出格式
  export_formats:
    - "markdown"
    - "docx"
    - "json"

  # Word文档配置
  docx:
    template: null  # 自定义模板路径
    include_toc: true
    include_page_numbers: true

# ==================== 高级配置 ====================
advanced:
  # 缓存配置
  cache:
    enabled: true
    ttl: 86400  # 秒 (24小时)
    max_size: "1GB"
    type: "disk"  # disk, memory, redis

  # 重试配置
  retry:
    max_retries: 5
    base_delay: 1.0  # 秒
    max_delay: 60.0  # 秒
    exponential_base: 2.0
    retry_on: [429, 500, 502, 503, 504]

  # 断路器配置
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout: 60  # 秒

  # 功能开关
  features:
    use_llm_query_analysis: true
    use_llm_synthesis: true
    use_exa_search: true
    use_similarity_expansion: true
    enable_zotero_sync: false
